name: CI

on:
  push:
    branches: [main, develop, ml-production-time]
  pull_request:
    branches: [main, develop]

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      web_docker: ${{ steps.filter.outputs.web_docker }}
      trainer_docker: ${{ steps.filter.outputs.trainer_docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web_docker:
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'src/**'
              - 'web/**'
              - 'api_server.py'
              - 'scripts/startup.sh'
              - '.github/workflows/ci.yml'
            trainer_docker:
              - 'vertex_ai/Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'src/**'
              - 'train_model.py'
              - '.github/workflows/ci.yml'

  python-tests:
    name: Python Tests & Linting
    runs-on: ubuntu-latest
    # Skip CI if commit message contains [skip ci], [ci skip], or [no ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]') && !contains(github.event.head_commit.message, '[no ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v \
            --cov=estate_value_index \
            --cov-report=term-missing \
            --cov-report=html
        env:
          GCS_ENABLED: "false"
          GCP_PROJECT_ID: "test-project"
          BIGQUERY_PROJECT_ID: "test-project"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

  typescript-tests:
    name: TypeScript Tests & Linting
    runs-on: ubuntu-latest
    # Skip CI if commit message contains [skip ci], [ci skip], or [no ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]') && !contains(github.event.head_commit.message, '[no ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run linter
        working-directory: web
        run: npm run lint

      - name: Run tests
        working-directory: web
        run: npm test
        env:
          CI: true

      - name: Type check
        working-directory: web
        run: npx tsc --noEmit

  web-dockerfile-validation:
    name: Build Web App Dockerfile
    runs-on: ubuntu-latest
    needs: changes
    # Skip when no web image-relevant files changed, or when the commit message asks to skip CI.
    if: "needs.changes.outputs.web_docker == 'true' && !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]') && !contains(github.event.head_commit.message, '[no ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Web App Dockerfile
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: estate-value-index-web:test
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=min,scope=web

  trainer-dockerfile-validation:
    name: Build Training Container Dockerfile
    runs-on: ubuntu-latest
    needs: changes
    # Skip when no training image-relevant files changed, or when the commit message asks to skip CI.
    if: "needs.changes.outputs.trainer_docker == 'true' && !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]') && !contains(github.event.head_commit.message, '[no ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Training Container Dockerfile
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./vertex_ai/Dockerfile
          push: false
          tags: estate-value-index-trainer:test
          cache-from: type=gha,scope=trainer
          cache-to: type=gha,mode=min,scope=trainer
