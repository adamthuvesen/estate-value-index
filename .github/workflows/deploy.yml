name: Deploy Web App

# Required environment-scoped GitHub secrets:
#   GCP_WORKLOAD_IDENTITY_PROVIDER - Workload Identity Federation provider resource
#   GCP_SERVICE_ACCOUNT - service account email with permissions:
#     - Cloud Run Admin
#     - Storage Object Viewer (for container runtime GCS access)
#     - Artifact Registry Reader (for container registry)
#
# Required environment-scoped GitHub variables:
#   GCP_PROJECT_ID
#   GCP_REGION
#   CLOUD_RUN_SERVICE_NAME
#   GCS_BUCKET
#
# Model Loading Architecture:
#   Models are loaded at container runtime (not during build).
#   The startup.sh script downloads models from gs://<your-gcs-bucket>/models/
#   when the container starts, before launching services.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      model_commit_sha:
        description: 'Commit SHA of trained model (leave empty for current commit)'
        required: false
        type: string

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE_NAME || 'estate-value-index-app' }}
      GCS_BUCKET: ${{ vars.GCS_BUCKET }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate environment configuration
        run: |
          test -n "${GCP_PROJECT_ID}" || { echo "GCP_PROJECT_ID environment variable is required"; exit 1; }
          test -n "${GCP_REGION}" || { echo "GCP_REGION environment variable is required"; exit 1; }
          test -n "${SERVICE_NAME}" || { echo "SERVICE_NAME environment variable is required"; exit 1; }
          test -n "${GCS_BUCKET}" || { echo "GCS_BUCKET environment variable is required"; exit 1; }

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # NOTE: Models are now loaded at container runtime from GCS (see scripts/startup.sh)
      # No need to download models during build - they're fetched when the container starts

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build Docker image
        run: |
          docker build -t gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
                      -t gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest .

      - name: Push Docker image to GCR
        run: |
          docker push gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        # Runs under the dedicated least-privilege runtime SA (GCS read only, no
        # BigQuery), not the default compute SA. The WIF deployer SA must hold
        # iam.serviceAccountUser on it (granted by scripts/setup_gcp.sh).
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --platform managed \
            --project ${{ env.GCP_PROJECT_ID }} \
            --region ${{ env.GCP_REGION }} \
            --service-account "evi-cloud-run-runtime@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 2 \
            --memory 1Gi \
            --cpu 1 \
            --timeout 900s \
            --port 8080 \
            --ingress internal \
            --set-env-vars "GCS_ENABLED=true,GCS_BUCKET=${{ env.GCS_BUCKET }},NODE_ENV=production,PREDICTION_API_URL=http://127.0.0.1:8000" \
            --quiet

      - name: Get deployment URL
        id: get-url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          # The service has `ingress: internal`, so HTTP probes from GitHub
          # runners get a Google-frontend 404. Verify revision readiness via
          # the Cloud Run control plane instead — that's what we actually care
          # about (the latest revision came up healthy).
          REVISION=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --region ${{ env.GCP_REGION }} \
            --format='value(status.latestReadyRevisionName)')

          if [ -z "$REVISION" ]; then
            echo "❌ No ready revision found for ${{ env.SERVICE_NAME }}"
            exit 1
          fi

          echo "✅ Latest ready revision: $REVISION"

          gcloud run revisions describe "$REVISION" \
            --project ${{ env.GCP_PROJECT_ID }} \
            --region ${{ env.GCP_REGION }} \
            --format='value(status.conditions)' | head -20

      - name: Summary
        run: |
          MODEL_SHA="${{ inputs.model_commit_sha || github.sha }}"
          echo "## Deployment Summary"
          echo "✅ Deployed to: ${{ steps.get-url.outputs.url }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Model Commit: ${MODEL_SHA}"
          echo "Image: gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
