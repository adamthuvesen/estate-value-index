# Pipeline Configuration
# Central configuration for Estate Value Index ML pipeline.
#
# Every key below is actually read by src/estate_value_index/utils/settings.py.
# This file previously carried ~200 lines of aspirational config (BigQuery
# partitioning, GCS prefixes, deployment sizing, monitoring thresholds, feature
# engineering knobs, checkpointing, pipeline modes) that nothing in the
# codebase consumed — verified by grepping every key across src/ and scripts/.
# Deployment sizing lives in scripts/deploy_cloud_run.sh; drift thresholds live
# in src/estate_value_index/monitoring/drift_detection.py; scraping filters
# live in the per-run JSON configs under src/estate_value_index/ingestion/config/.
# If you add a new setting here, wire it up in settings.py in the same change —
# an unread config key is a silent no-op, not a documented intent.

training:
  median_ape_threshold: 0.08  # Maximum acceptable MdAPE (median absolute % error)
  test_size: 0.2  # Train/test split ratio
  random_state: 42  # Reproducibility seed
  cv_folds: 5  # Cross-validation folds

bigquery:
  batch_size: 1000  # Batch size for inserts

scraping:
  default_max_pages: 10  # Default scraping page limit
  min_validation_rate: 0.5  # Minimum valid scraped-listing ratio
