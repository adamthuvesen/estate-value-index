# Pipeline Configuration
# Central configuration for Estate Value Index ML pipeline

# ==============================================================================
# TRAINING CONFIGURATION
# ==============================================================================
training:
  # Performance thresholds
  mae_threshold: 260000  # Maximum acceptable MAE in SEK
  max_training_time_minutes: 120  # Timeout for training jobs

  # Feature engineering
  min_importance_threshold: 0.001  # Minimum feature importance to keep
  feature_count_target: 86  # Target number of features

  # Model validation
  test_size: 0.2  # Train/test split ratio
  random_state: 42  # Reproducibility seed
  cv_folds: 5  # Cross-validation folds

# ==============================================================================
# BIGQUERY CONFIGURATION
# ==============================================================================
bigquery:
  # Query settings
  batch_size: 1000  # Batch size for inserts
  timeout_seconds: 300  # Query timeout
  max_results: 10000  # Max results per query

  # Partitioning
  partition_field: scraped_at_date  # Raw data partition field
  feature_partition_field: feature_date  # Feature partition field

  # Clustering
  raw_clustering_fields:
    - area
    - postal_code
  feature_clustering_fields:
    - sold_date

# ==============================================================================
# GCS CONFIGURATION
# ==============================================================================
gcs:
  # Bucket structure
  models_prefix: models/  # Model artifacts prefix
  enrichment_prefix: enrichment/  # Enrichment data prefix
  data_prefix: data/  # Raw data prefix

  # Upload settings
  chunk_size_mb: 10  # Upload chunk size
  timeout_seconds: 300  # Upload timeout

# ==============================================================================
# DEPLOYMENT CONFIGURATION
# ==============================================================================
deployment:
  # Cloud Run settings
  service_name: estate-value-index-app
  region: europe-north1
  min_instances: 0  # Scale to zero when idle
  max_instances: 2  # Max concurrent instances
  memory: 512Mi  # Memory allocation
  cpu: 1  # CPU allocation

  # Health check settings
  health_check_path: /health
  health_check_timeout: 10  # Seconds
  health_check_retries: 3

# ==============================================================================
# SCRAPING CONFIGURATION
# ==============================================================================
scraping:
  # Limits
  default_max_pages: 10  # Default scraping page limit
  production_max_pages: 50  # Production scraping limit
  max_concurrent_requests: 4  # Concurrent request limit

  # Rate limiting
  download_delay: 0.1  # Delay between requests (seconds)
  autothrottle_enabled: true
  autothrottle_start_delay: 0.5
  autothrottle_max_delay: 3.0

  # Filters (Booli search parameters)
  min_price: 3000000  # Minimum price filter (SEK)
  max_price: 8000000  # Maximum price filter (SEK)
  min_living_area: 40  # Minimum area filter (sqm)
  max_living_area: 80  # Maximum area filter (sqm)
  min_rooms: 2  # Minimum rooms filter
  max_rooms: 4  # Maximum rooms filter

# ==============================================================================
# DATA QUALITY CONFIGURATION
# ==============================================================================
data_quality:
  # Price validation
  min_expected_price: 1000000  # Minimum expected price (SEK)
  max_expected_price: 10000000  # Maximum expected price (SEK)
  outlier_threshold_pct: 5.0  # Max % of outliers allowed

  # Count validation
  min_listing_count: 100  # Minimum listings required

  # Required fields
  required_fields:
    - sold_price
    - living_area
    - rooms
    - area
    - sold_date

  # Null tolerance
  max_null_pct: 20.0  # Max % null values per field

# ==============================================================================
# MONITORING CONFIGURATION
# ==============================================================================
monitoring:
  # Cost thresholds
  max_daily_bigquery_cost: 1.0  # USD
  max_monthly_gcs_cost: 5.0  # USD

  # Alert settings
  enable_alerts: true
  alert_channels:
    # - email  # Uncomment to enable email alerts

  # Drift detection settings
  drift_detection:
    enabled: true
    schedule: "0 3 * * 1"  # Weekly Monday 3 AM UTC
    days_lookback: 7  # Days of predictions to analyze
    auto_retrain_on_degradation: true

    # Drift thresholds
    drift_threshold:
      wasserstein_distance: 0.1  # Statistical test threshold for numeric features
      chi_square_alpha: 0.05  # Significance level for categorical features
      performance_degradation_pct: 10.0  # % MAE increase triggering retraining
      min_drifted_features: 3  # Minimum drifted features for alert

    # Auto-retraining settings
    retraining:
      cooldown_days: 7  # Minimum days between auto-retrains
      max_consecutive_retrains: 3  # Circuit breaker limit

# ==============================================================================
# VERTEX AI CONFIGURATION
# ==============================================================================
vertex_ai:
  # Machine types (for different workloads)
  machine_types:
    quick: n1-standard-4  # Quick testing
    standard: n1-standard-4  # Standard training
    tuning: n1-standard-8  # Hyperparameter tuning

  # Container settings
  container_image_name: vertex-ai-trainer
  container_registry: gcr.io

  # Job settings
  job_timeout_hours: 2  # Max job duration
  enable_early_stopping: true
  log_streaming: true  # Stream logs during training

# ==============================================================================
# FEATURE ENGINEERING CONFIGURATION
# ==============================================================================
features:
  # Categorical encoding
  target_encoding_fields:
    - area
    - age_bucket

  # Interaction features
  enable_interactions: true
  interaction_pairs:
    - [area, living_area]
    - [area, property_age]
    - [rooms, property_age]
    - [monthly_fee, sold_price]

  # Polynomial features
  polynomial_degree: 2
  polynomial_fields:
    - living_area
    - rooms

# ==============================================================================
# CHECKPOINTING CONFIGURATION
# ==============================================================================
checkpointing:
  enabled: true
  checkpoint_path: /tmp/pipeline_checkpoint.json
  auto_resume: false  # Automatically resume from last checkpoint

  # Stage definitions
  stages:
    - data_collection
    - training
    - enrichment
    - deployment
    - notification

# ==============================================================================
# TESTING CONFIGURATION
# ==============================================================================
testing:
  # Regression testing
  baseline_mae: 725000  # Baseline MAE for regression tests (average price/m² × size)
  regression_threshold_pct: 10.0  # Max % regression allowed

  # Integration testing
  enable_integration_tests: true
  test_timeout_seconds: 300

# ==============================================================================
# PIPELINE MODES
# ==============================================================================
modes:
  quick:
    max_pages: 5
    tune: false
    deploy: false
    notify: false
    machine_type: n1-standard-4

  standard:
    max_pages: 20
    tune: false
    deploy: false
    notify: false
    machine_type: n1-standard-4

  production:
    max_pages: 50
    tune: true
    deploy: true
    notify: true
    machine_type: n1-standard-4

  retrain:
    skip_scraping: true
    tune: true
    deploy: false
    notify: false
    machine_type: n1-standard-4
